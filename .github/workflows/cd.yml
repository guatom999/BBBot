name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bbbot

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker with Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
  
      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log pwd
        run: |
          pwd
          ls -al

      - name: Pull latest image
        run: |
          IMAGE_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "${{ secrets.ENV_FILE}}" > .env
          echo "DOCKER_IMAGE=${{env.DOCKER_IMAGE}}" >> .env
          echo "IMAGE_TAG=$IMAGE_TAG" >> .env
          echo "IMAGE_NAME=${{env.DOCKER_IMAGE }}:$IMAGE_TAG" >> .env
          docker pull "${{ env.DOCKER_IMAGE }}:$IMAGE_TAG"

      - name: Verify .env file created
        run: |
          ls -al .env
          echo "----"
           wc -l .env

      - name: Docker Compose up
        run: |
          docker compose up -d --remove-orphans

      - name: Clean old image
        run: |
          docker image prune -f
